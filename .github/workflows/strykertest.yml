name: Mutation Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  mutation-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Install Stryker
        run: npm install --save-dev @stryker-mutator/core @stryker-mutator/typescript-checkmate
      - name: Run Stryker Mutation Tests
        run: npx stryker run
